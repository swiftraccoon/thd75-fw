name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-versions:
    name: Resolve Python Versions
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.versions.outputs.latest-python-versions }}
    steps:
      - uses: snok/latest-python-versions@v1
        id: versions
        with:
          min-version: "3.10"
          include-prereleases: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install ruff
      - run: ruff check src/ tests/

  typecheck:
    name: Type Check (Python ${{ matrix.python-version }})
    needs: [python-versions]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJson(needs.python-versions.outputs.versions) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install mypy pyright
      - run: mypy src/ --strict
      - run: pyright

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: [python-versions]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJson(needs.python-versions.outputs.versions) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest
      - run: PYTHONPATH=src pytest tests/ -v
