name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check src/ tests/

  typecheck:
    name: Type Check (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and type-checker dependencies
        # Install the package itself so ``thd75_fw.*`` imports resolve
        # inside tests, plus the test deps used in ``tests/`` (pytest,
        # hypothesis) and ``tomli`` explicitly. The runtime ``tomli``
        # requirement in pyproject.toml is gated on ``python_version <
        # '3.11'``, but ``pyrightconfig.json`` pins ``pythonVersion:
        # 3.10`` so static analysis takes the ``else: import tomli as
        # tomllib`` branch in patch.py on every Python — meaning tomli
        # must be importable for the type-checker even when the host
        # interpreter is 3.11+.
        run: pip install -e . pytest pytest-cov hypothesis tomli mypy pyright
      - run: mypy src/ tests/ --strict
      - run: pyright

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest hypothesis
      - run: PYTHONPATH=src pytest tests/ -v

  package:
    name: Package validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install pytest pytest-cov hypothesis
      - run: PYTHONPATH=src pytest tests/ --cov=thd75_fw --cov-report=xml --cov-report=term
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
